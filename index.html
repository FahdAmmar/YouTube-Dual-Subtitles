<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0E14" />

    <!--
      سكربت مضمّن (Inline) يُنفَّذ قبل أي رسم للصفحة، لتطبيق السمة الصحيحة
      (الداكنة أو الفاتحة) فوراً دون وميض مرئي (Flash of Wrong Theme).
      المفتاح 'ydc:theme-preference' يجب أن يبقى مطابقاً تماماً لقيمة
      STORAGE_KEYS.THEME في src/constants/theme.constants.ts
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('ydc:theme-preference')
          var preference = stored ? JSON.parse(stored) : 'system'
          var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var resolved = preference === 'system' ? (systemPrefersDark ? 'dark' : 'light') : preference
          document.documentElement.setAttribute('data-theme', resolved)
        } catch (error) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <meta
      name="description"
      content="شاهد فيديوهات يوتيوب مع ترجمتين متزامنتين بلغتين مختلفتين في آن واحد — أداة مثالية لتعلم اللغات ومقارنة الترجمات."
    />
    <meta property="og:title" content="مترجم يوتيوب المزدوج" />
    <meta
      property="og:description"
      content="شاهد فيديوهات يوتيوب مع ترجمتين متزامنتين بلغتين مختلفتين في آن واحد."
    />
    <meta property="og:type" content="website" />

    <!-- ربط مسبق بخوادم الخطوط لتسريع التحميل الأولي (تحسين LCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>مترجم يوتيوب المزدوج | ترجمتان متزامنتان بلغتين مختلفتين</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
